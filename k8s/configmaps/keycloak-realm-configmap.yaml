apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: gateway-demo
data:
  realm-export.json: |
    {
      "realm": "demo-realm",
      "displayName": "Spring Cloud Gateway Demo",
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "bruteForceProtected": true,
      "accessTokenLifespan": 300,

      "roles": {
        "realm": [
          { "name": "USER",  "description": "Standard authenticated user", "composite": false },
          { "name": "ADMIN", "description": "Administrative access",       "composite": false }
        ]
      },

      "clients": [
        {
          "clientId": "gateway-client",
          "name": "Gateway Demo Client",
          "description": "Public client using PKCE — no client secret",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": ["http://localhost:5173/*", "http://localhost:3000/*"],
          "webOrigins": ["http://localhost:5173", "http://localhost:3000"],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          },
          "protocolMappers": [
            {
              "name": "department-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "department",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "department",
                "jsonType.label": "String"
              }
            },
            {
              "name": "realm-roles-mapper",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "multivalued": "true",
                "userinfo.token.claim": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "realm_access.roles",
                "jsonType.label": "String"
              }
            }
          ]
        }
      ],

      "users": [
        {
          "username": "regular-user",
          "email": "user@demo.local",
          "firstName": "Regular",
          "lastName": "User",
          "enabled": true,
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "user123", "temporary": false }],
          "realmRoles": ["USER"],
          "attributes": { "department": ["Engineering"] }
        },
        {
          "username": "admin-user",
          "email": "admin@demo.local",
          "firstName": "Admin",
          "lastName": "User",
          "enabled": true,
          "emailVerified": true,
          "credentials": [{ "type": "password", "value": "admin123", "temporary": false }],
          "realmRoles": ["USER", "ADMIN"],
          "attributes": { "department": ["Platform"] }
        }
      ]
    }

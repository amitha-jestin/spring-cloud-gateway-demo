apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: gateway-demo
data:
  tempo-config.yml: |
    server:
      http_listen_port: 3200
      log_level: warn
    ingester:
      max_block_duration: 5m

    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/blocks
        wal:
          path: /tmp/tempo/wal

    compactor:
      compaction:
        block_retention: 1h

    query_frontend:
      search:
        duration_slo: 5s
        throughput_bytes_slo: 1.073741824e+09
      trace_by_id:
        duration_slo: 5s

    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: local
      storage:
        path: /tmp/tempo/generator/wal
        remote_write:
          - url: http://prometheus:9090/api/v1/write
            send_exemplars: true
      processor:
        service_graphs:
          dimensions: []
        span_metrics:
          dimensions: []

    overrides:
      metrics_generator_processors:
        - service-graphs
        - span-metrics

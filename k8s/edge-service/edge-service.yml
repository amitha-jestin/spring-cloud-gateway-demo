# ─────────────────────────────────────────────────────────────────────────────
# edge-service — Kubernetes Manifests
# Apply: kubectl apply -f k8s/api-gateway/
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-service-config
  namespace: gateway-demo
data:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  APP_ENV: "local"
  # Provider-agnostic — change these two to switch identity provider
  JWKS_URI: "http://keycloak:8180/realms/demo-realm/protocol/openid-connect/certs"
  ISSUER_URI: "http://keycloak:8180/realms/demo-realm"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  OTEL_ENDPOINT: "http://tempo:4317"
  LOKI_URL: "http://loki:3100"
  BOOKING_SERVICE_URL: "http://booking-service:9001"

---
apiVersion: v1
kind: Secret
metadata:
  name: edge-service-secret
  namespace: gateway-demo
type: Opaque
data:
  REDIS_PASSWORD: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-service
  namespace: gateway-demo
  labels:
    app: edge-service
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edge-service
  template:
    metadata:
      labels:
        app: edge-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: edge-service
          image: amithapoulose/edge-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef: { name: edge-service-config }
            - secretRef:    { name: edge-service-secret }
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests: { memory: "256Mi", cpu: "250m" }
            limits:   { memory: "512Mi", cpu: "500m" }

---
apiVersion: v1
kind: Service
metadata:
  name: edge-service
  namespace: gateway-demo
  labels:
    app: edge-service
spec:
  type: ClusterIP
  selector:
    app: edge-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edge-service-hpa
  namespace: gateway-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edge-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 80 }

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edge-service-ingress
  namespace: gateway-demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: gateway.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: edge-service
                port: { number: 8080 }

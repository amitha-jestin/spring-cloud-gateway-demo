server:
  port: 9001

spring:
  application:
    name: booking-service

# ── Actuator + Metrics ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENV:local}

  # ── OpenTelemetry Tracing ───────────────────────────────────────────────
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  otlp:
    traces:
      endpoint: ${OTEL_ENDPOINT:http://localhost:4318/v1/traces}
    logs:
      endpoint: ${OTEL_ENDPOINT:http://localhost:4318/v1/logs}
# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.amithapoulose.booking: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId},spanId=%X{spanId}] %logger{36} - %msg%n"
